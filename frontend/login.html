<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartReview - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/components.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0A0A0A;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .login-subtitle {
            font-size: 14px;
            font-weight: 400;
            color: #6B7280;
        }

        .login-card {
            background: #111111;
            border: 1px solid #1F1F1F;
            border-radius: 16px;
            padding: 32px;
        }

        .google-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .google-btn:hover {
            background: #f5f5f5;
            transform: translateY(-1px);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #4B5563;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1F1F1F;
        }

        .divider span {
            padding: 0 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #9CA3AF;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            background: #1A1A1A;
            border: 1px solid #2A2A2A;
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 15px;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            border-color: #E11D48;
            box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1);
        }

        .form-input::placeholder {
            color: #4B5563;
        }

        .login-btn {
            width: 100%;
            background: #E11D48;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: #DC2626;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .signup-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #6B7280;
        }

        .signup-link a {
            color: #E11D48;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(225, 29, 72, 0.1);
            border: 1px solid #E11D48;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: #FCA5A5;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo">
                <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="10" fill="#E11D48"/>
                    <polyline points="6,22 12,14 17,18 22,10 26,10"
                        stroke="white" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <circle cx="26" cy="10" r="2.5" fill="white"/>
                </svg>
            </div>
            <h1 class="login-title">Bienvenue sur SmartReview</h1>
            <p class="login-subtitle">Votre copilote trading intelligent</p>
        </div>

        <div class="login-card">
            <div class="error-message" id="errorMessage"></div>

            <button class="google-btn" id="googleBtn">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continuer avec Google
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Se connecter</button>
            </form>

            <div class="signup-link">
                Pas encore de compte ? <a href="#">Créer un compte</a>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8001';

        // Initialize Google OAuth
        google.accounts.id.initialize({
            client_id: "1019052619423-05sip0ln6bh8s212vr0lujmnelkhak1s.apps.googleusercontent.com",
            callback: handleGoogleLogin
        });

        // Render Google button
        google.accounts.id.renderButton(
            document.getElementById('googleBtn'),
            { theme: 'outline', size: 'large', width: '100%' }
        );

        function handleGoogleLogin(response) {
            fetch(BASE_URL + '/api/auth/google', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token: response.credential})
            })
            .then(r => r.json())
            .then(data => {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = '/index.html';
            })
            .catch(error => {
                showError('Erreur lors de la connexion Google');
                console.error('Google auth error:', error);
            });
        }

        // Email/Password login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(BASE_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({email}));
                    window.location.href = '/index.html';
                } else {
                    showError('Email ou mot de passe incorrect');
                }
            } catch (error) {
                showError('Erreur lors de la connexion');
                console.error('Login error:', error);
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
