                <svg class="google-icon" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Continuer avec Google
            </button>

            <div class="divider">
                <span>ou</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="login-btn">Se connecter</button>
            </form>

            <div class="signup-link">
                Pas encore de compte ? <a href="#">Créer un compte</a>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://localhost:8001';

        // Initialize Google OAuth
        google.accounts.id.initialize({
            client_id: "1019052619423-05sip0ln6bh8s212vr0lujmnelkhak1s.apps.googleusercontent.com",
            callback: handleGoogleLogin
        });

        // Render Google button
        google.accounts.id.renderButton(
            document.getElementById('googleBtn'),
            { theme: 'outline', size: 'large', width: '100%' }
        );

        function handleGoogleLogin(response) {
            try {
                const payload = JSON.parse(atob(response.credential.split('.')[1]));
                const user = {
                    email: payload.email,
                    name: payload.name,
                    picture: payload.picture,
                    sub: payload.sub
                };
                localStorage.setItem('token', response.credential);
                localStorage.setItem('user', JSON.stringify(user));
                window.location.href = '/index.html';
            } catch(e) {
                showError('Erreur lors de la connexion Google');
            }
        }

        // Email/Password login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(BASE_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify({email}));
                    window.location.href = '/index.html';
                } else {
                    showError('Email ou mot de passe incorrect');
                }
            } catch (error) {
                showError('Erreur lors de la connexion');
                console.error('Login error:', error);
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }
    </script>
