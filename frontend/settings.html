        /* Settings-specific styles - FullMargin-inspired */
        .settings-layout {
            display: flex;
            gap: 32px;
        }

        .settings-menu {
            width: 200px;
            flex-shrink: 0;
        }

        .settings-menu-item {
            padding: 10px 16px;
            margin-bottom: 4px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: #6B6B6B;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .settings-menu-item:hover {
            background-color: #141414;
            color: #FFFFFF;
        }

        .settings-menu-item.active {
            color: var(--accent);
        }

        .settings-content {
            flex: 1;
        }

        .settings-card {
            background: #141414;
            border: 1px solid #1E1E1E;
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 16px;
        }

        .settings-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #3A3A3A;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            background: #0F0F0F;
            border: 1px solid #1E1E1E;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .color-dots {
            display: flex;
            gap: 12px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .color-dot.selected {
            outline: 2px solid currentColor;

            padding: 9px 18px;

            border-radius: var(--radius-sm);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

            background: var(--accent-hover);

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Color dot selection
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', function() {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // Load active account
        API.getAccounts().then(accounts => {
            const select = document.getElementById('activeAccount');
            if (accounts && accounts.length > 0) {
                select.innerHTML = accounts.map(acc => 
                    `<option value="${acc.id}">${acc.name}</option>`
                ).join('');
            } else {
                select.innerHTML = '<option value="">Aucun compte</option>';
            }
        }).catch(err => {
            console.error('Error loading accounts:', err);
        });
        
        // Backend status check
        setInterval(() => {
            fetch('http://localhost:8001/health')
                .then(res => res.ok)
                .then(online => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    if (online) {
                        dot.className = 'status-dot online';
                        text.textContent = 'En ligne';
                    } else {
                        dot.className = 'status-dot offline';
                        text.textContent = 'Hors ligne';
                    }
                })
                .catch(() => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    dot.className = 'status-dot offline';
                    text.textContent = 'Hors ligne';
                });

<script id="settings-js">
document.addEventListener('DOMContentLoaded', function() {
  // Toggle buttons
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      this.closest('.toggle-group').querySelectorAll('.toggle-btn')
        .forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // Color dots
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', function() {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      this.classList.add('active');
      const color = this.dataset.color;
      document.documentElement.style.setProperty('--accent', color);
      localStorage.setItem('accentColor', color);
    });
  });

  // Restore accent color
  const savedColor = localStorage.getItem('accentColor');
  if (savedColor) {
    document.documentElement.style.setProperty('--accent', savedColor);
    document.querySelectorAll('.color-dot').forEach(d => {
      if (d.dataset.color === savedColor) d.classList.add('active');
      else d.classList.remove('active');
    });
  }

  // Save button
  const saveBtn = document.querySelector('.btn-save, button[type="submit"]');
  if (saveBtn) {
    saveBtn.addEventListener('click', function(e) {
      e.preventDefault();
      this.textContent = '✓ Sauvegardé !';
      this.style.background = 'linear-gradient(135deg, #22C55E, #16A34A)';
      setTimeout(() => {
        this.textContent = 'Sauvegarder les paramètres';
      }, 2000);
    });
  }

  // Toggle switches
  document.querySelectorAll('.toggle-switch').forEach(toggle => {
    toggle.addEventListener('change', function() {
      localStorage.setItem('toggle_' + this.name, this.checked);
    });
    const saved = localStorage.getItem('toggle_' + toggle.name);
    if (saved !== null) toggle.checked = saved === 'true';
  });
});
</script>
<script id="buttons-fix">
document.addEventListener('DOMContentLoaded', function() {

  // RECHERCHE
  const searchInput = document.getElementById('globalSearch');
  const searchIcon = document.querySelector('.navbar-search-icon');
  if(searchInput) {
    searchInput.addEventListener('keypress', function(e) {
      if(e.key === 'Enter' && this.value.trim()) {
        window.open('https://www.google.com/search?q=' + encodeURIComponent(this.value + ' trading'), '_blank');
      }
    });
  }
  if(searchIcon) {
    searchIcon.style.cursor = 'pointer';
    searchIcon.addEventListener('click', function() {
      if(searchInput) searchInput.focus();
    });
  }

  // NOTIFICATIONS
  const notifBtn = document.getElementById('notifBtn');
  if(notifBtn) {
    notifBtn.addEventListener('click', function() {
      // Créer panel notifications
      let panel = document.getElementById('notifPanel');
      if(panel) { panel.remove(); return; }
      panel = document.createElement('div');
      panel.id = 'notifPanel';
      panel.style.cssText = 'position:fixed;top:64px;right:16px;width:320px;background:#141414;border:1px solid #1E1E1E;border-radius:16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,0.5);';
      panel.innerHTML = `
        <div style="padding:16px;border-bottom:1px solid #1E1E1E;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:14px;font-weight:600;">Notifications</span>
          <button onclick="document.getElementById('notifPanel').remove()" style="background:none;border:none;color:#6B7280;cursor:pointer;font-size:18px;">×</button>
        </div>
        <div style="padding:16px;">
          <div style="text-align:center;padding:24px;color:#374151;font-size:13px;">
            <div style="font-size:32px;margin-bottom:8px;">🔔</div>
            Aucune notification pour le moment
          </div>
        </div>`;
      document.body.appendChild(panel);
      document.addEventListener('click', function closePanel(e) {
        if(!panel.contains(e.target) && e.target !== notifBtn) {
          panel.remove();
          document.removeEventListener('click', closePanel);
        }
      }, { once: false });
    });
  }

  // REFRESH
  const refreshBtn = document.getElementById('refreshBtn');
  if(refreshBtn) {
    refreshBtn.addEventListener('click', function() {
      this.style.transform = 'rotate(360deg)';
      this.style.transition = 'transform 0.5s';
      setTimeout(() => { this.style.transform = ''; }, 500);
      window.location.reload();
    });
  }

  // BALANCE PILL
  const balancePill = document.getElementById('balancePill');
  if(balancePill) {
    balancePill.style.cursor = 'pointer';
    balancePill.addEventListener('click', () => window.location.href = 'accounts.html');
  }

  // AVATAR / USER MENU
  const avatarBtn = document.getElementById('userAvatarBtn');
  const dropdown = document.getElementById('userDropdown');
  if(avatarBtn && dropdown) {
    avatarBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      dropdown.style.cssText = 'display:block;position:absolute;top:100%;right:0;background:#141414;border:1px solid #1E1E1E;border-radius:12px;min-width:180px;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.5);overflow:hidden;';
    });
    document.addEventListener('click', function() {
      if(dropdown) dropdown.style.display = 'none';
    });
  }

  // USER INFO depuis localStorage
  try {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if(user.name) {
      const initials = document.getElementById('userAvatarInitials');
      const img = document.getElementById('userAvatarImg');
      if(initials) initials.textContent = user.name.slice(0,2).toUpperCase();
      if(img && user.picture) {
        img.src = user.picture;
        img.classList.remove('hidden');
        img.style.display = 'block';
        if(initials) initials.style.display = 'none';
      }
    }
  } catch(e) {}

  // LOGOUT
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) {
    logoutBtn.addEventListener('click', function() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    });
  }

  // NOUVEAU TRADE BTN
  const newTradeBtn = document.getElementById('sidebarNewTradeBtn');
  if(newTradeBtn) {
    newTradeBtn.addEventListener('click', function() {
      // Ouvrir modal si sur dashboard
      const modal = document.getElementById('tradeModal');
      if(modal) {
        modal.classList.add('active');
        modal.style.display = 'flex';
      } else {
        window.location.href = 'journal.html';
      }
    });
  }

  // MOBILE MENU
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const sidebar = document.getElementById('sidebar');
  if(mobileMenuBtn && sidebar) {
    mobileMenuBtn.addEventListener('click', function() {
      sidebar.classList.toggle('open');
    });
  }

  // SIDEBAR TOGGLE
  const sidebarToggle = document.getElementById('sidebarToggle');
  const appWrapper = document.getElementById('appWrapper');
  if(sidebarToggle) {
    sidebarToggle.addEventListener('click', function() {
      sidebar && sidebar.classList.toggle('collapsed');
      appWrapper && appWrapper.classList.toggle('sidebar-collapsed');
      localStorage.setItem('sidebarCollapsed', sidebar && sidebar.classList.contains('collapsed'));
    });
    // Restaurer état
    if(localStorage.getItem('sidebarCollapsed') === 'true') {
      sidebar && sidebar.classList.add('collapsed');
      appWrapper && appWrapper.classList.add('sidebar-collapsed');
    }
  }

});
</script><script id="keepalive">
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:8001'
  : 'https://smartreview-y4sq.onrender.com';

// Reveiller le backend au chargement
async function wakeBackend() {
  try {
    const res = await fetch(API_BASE + '/', {method:'GET'});
    const statusDot = document.getElementById('backendStatus');
    const statusText = document.getElementById('backendStatusText');
    if(res.ok) {
      if(statusDot) statusDot.className = 'status-dot online';
      if(statusText) statusText.textContent = 'En ligne';
    }
  } catch(e) {
    const statusDot = document.getElementById('backendStatus');
    const statusText = document.getElementById('backendStatusText');
    if(statusDot) statusDot.className = 'status-dot offline';
    if(statusText) statusText.textContent = 'Hors ligne';
  }
}

// Ping toutes les 10 minutes pour garder le backend actif
wakeBackend();
