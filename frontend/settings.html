<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartReview - Paramètres</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        /* Settings-specific styles - FullMargin-inspired */
        .settings-layout {
            display: flex;
            gap: 32px;
        }

        .settings-menu {
            width: 200px;
            flex-shrink: 0;
        }

        .settings-menu-item {
            padding: 10px 16px;
            margin-bottom: 4px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: #6B6B6B;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .settings-menu-item:hover {
            background-color: #141414;
            color: #FFFFFF;
        }

        .settings-menu-item.active {
            color: var(--accent);
        }

        .settings-content {
            flex: 1;
        }

        .settings-card {
            background: #141414;
            border: 1px solid #1E1E1E;
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 16px;
        }

        .settings-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #3A3A3A;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            background: #0F0F0F;
            border: 1px solid #1E1E1E;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .color-dots {
            display: flex;
            gap: 12px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .color-dot.selected {
            outline: 2px solid currentColor;
            outline-offset: 2px;
        }

        .btn-save {
            padding: 9px 18px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .btn-save:hover {
            background: var(--accent-hover);
        }
    </style>

<style>
*:not(input[type=range]):not(.status-dot):not(.avatar):not(img) {
  border-radius: inherit;
}
div, section, article, aside, nav, header, footer,
button, input, select, textarea, a {
  border-radius: 14px;
}
.navbar, .sidebar, body, html { border-radius: 0 !important; }
input[type=checkbox], input[type=radio] { border-radius: 4px !important; }
.avatar, .status-dot { border-radius: 50% !important; }
input[type=range] { border-radius: 2px !important; }
</style>
</head>
<body>
    <!-- Main Content -->
        <div id="app-layout-root"></div>
    <div class="app-wrapper" id="appWrapper">
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <div class="breadcrumb">Settings / Paramètres</div>
                    <h1 class="page-title">Paramètres</h1>
                </div>
            </header>
            
            <!-- Settings Layout -->
            <div class="settings-layout">
                <!-- Settings Menu -->
                <div class="settings-menu">
                    <div class="settings-menu-item active">Profil</div>
                    <div class="settings-menu-item">Apparence</div>
                    <div class="settings-menu-item">Notifications</div>
                    <div class="settings-menu-item">API & Intégrations</div>
                </div>
                
                <!-- Settings Content -->
                <div class="settings-content">
                    <!-- Profile Section -->
                    <div class="settings-card">
                        <h3>Profil</h3>
                        
                        <div class="form-group">
                            <label>Nom</label>
                            <input type="text" class="form-input" placeholder="Votre nom" value="Trader">
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" class="form-input" placeholder="votre@email.com" value="trader@example.com">
                        </div>
                        
                        <div class="form-group">
                            <label>Devise</label>
                            <select class="form-input">
                                <option value="USD" selected>USD ($)</option>
                                <option value="EUR">EUR (€)</option>
                                <option value="GBP">GBP (£)</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Appearance Section -->
                    <div class="settings-card">
                        <h3>Apparence</h3>
                        
                        <div class="form-group">
                            <label>Couleur accent</label>
                            <div class="color-dots">
                                <div class="color-dot selected" style="background: #E11D48; color: #E11D48;"></div>
                                <div class="color-dot" style="background: #6366F1; color: #6366F1;"></div>
                                <div class="color-dot" style="background: #22C55E; color: #22C55E;"></div>
                                <div class="color-dot" style="background: #F59E0B; color: #F59E0B;"></div>
                                <div class="color-dot" style="background: #3B82F6; color: #3B82F6;"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- API Section -->
                    <div class="settings-card">
                        <h3>API & Intégrations</h3>
                        
                        <div class="form-group">
                            <label>Clé Anthropic API</label>
                            <input type="password" class="form-input" placeholder="sk-ant-..." value="">
                            <div class="form-hint">Nécessaire pour l'IA Coach et l'Edge Tracker™</div>
                        </div>
                    </div>
                    
                    <!-- Save Button -->
                    <button class="btn-save">Enregistrer les modifications</button>
                </div>
            </div>
        </main>
    </div>
    </div>
    
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Color dot selection
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', function() {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // Load active account
        API.getAccounts().then(accounts => {
            const select = document.getElementById('activeAccount');
            if (accounts && accounts.length > 0) {
                select.innerHTML = accounts.map(acc => 
                    `<option value="${acc.id}">${acc.name}</option>`
                ).join('');
            } else {
                select.innerHTML = '<option value="">Aucun compte</option>';
            }
        }).catch(err => {
            console.error('Error loading accounts:', err);
        });
        
        // Backend status check
        setInterval(() => {
            fetch('http://localhost:8001/health')
                .then(res => res.ok)
                .then(online => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    if (online) {
                        dot.className = 'status-dot online';
                        text.textContent = 'En ligne';
                    } else {
                        dot.className = 'status-dot offline';
                        text.textContent = 'Hors ligne';
                    }
                })
                .catch(() => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    dot.className = 'status-dot offline';
                    text.textContent = 'Hors ligne';
                });
        }, 5000);
    </script>
    <script src="/js/layout.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
