    <style>
        /* Settings-specific styles - FullMargin-inspired */
        .settings-layout {
            display: flex;
            gap: 32px;
        }

        .settings-menu {
            width: 200px;
            flex-shrink: 0;
        }

        .settings-menu-item {
            padding: 10px 16px;
            margin-bottom: 4px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            color: #6B6B6B;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .settings-menu-item:hover {
            background-color: #141414;
            color: #FFFFFF;
        }

        .settings-menu-item.active {
            color: var(--accent);
        }

        .settings-content {
            flex: 1;
        }

        .settings-card {
            background: #141414;
            border: 1px solid #1E1E1E;
            border-radius: var(--radius-md);
            padding: 24px;
            margin-bottom: 16px;
        }

        .settings-card h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #3A3A3A;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            background: #0F0F0F;
            border: 1px solid #1E1E1E;
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .color-dots {
            display: flex;
            gap: 12px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .color-dot.selected {
            outline: 2px solid currentColor;
            outline-offset: 2px;
        }

        .btn-save {
            padding: 9px 18px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .btn-save:hover {
            background: var(--accent-hover);
        }
    </style>

<body>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Color dot selection
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', function() {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // Load active account
        API.getAccounts().then(accounts => {
            const select = document.getElementById('activeAccount');
            if (accounts && accounts.length > 0) {
                select.innerHTML = accounts.map(acc => 
                    `<option value="${acc.id}">${acc.name}</option>`
                ).join('');
            } else {
                select.innerHTML = '<option value="">Aucun compte</option>';
            }
        }).catch(err => {
            console.error('Error loading accounts:', err);
        });
        
        // Backend status check
        setInterval(() => {
            fetch('http://localhost:8001/health')
                .then(res => res.ok)
                .then(online => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    if (online) {
                        dot.className = 'status-dot online';
                        text.textContent = 'En ligne';
                    } else {
                        dot.className = 'status-dot offline';
                        text.textContent = 'Hors ligne';
                    }
                })
                .catch(() => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    dot.className = 'status-dot offline';
                    text.textContent = 'Hors ligne';
                });
        }, 5000);
    </script>
    <script src="/js/layout.js"></script>
    <script>lucide.createIcons();</script>
<style id="settings-fix">
.settings-section { margin-bottom: 24px; }
.settings-card {
  background: #141414;
  border: 1px solid #1E1E1E;
  border-radius: 16px;
  padding: 24px;
}
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid #1A1A1A;
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 14px; color: #fff; font-weight: 500; }
.setting-desc { font-size: 12px; color: #6B7280; margin-top: 2px; }

/* Toggle switch */
.toggle-switch {
  position: relative;
  width: 44px;
  height: 24px;
  appearance: none;
  background: #2A2A2A;
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.2s;
  border: none !important;
  padding: 0 !important;
  flex-shrink: 0;
}
.toggle-switch:checked { background: #22C55E !important; }
.toggle-switch::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 18px; height: 18px;
  background: white;
  border-radius: 50%;
  transition: transform 0.2s;
}
.toggle-switch:checked::after { transform: translateX(20px); }

/* Color dots */
.color-picker-row { display: flex; gap: 10px; }
.color-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s;
  border: 2px solid transparent;
}
.color-dot.active, .color-dot:hover {
  transform: scale(1.2);
  border-color: white;
}

/* Toggle group */
.toggle-group { display: flex; gap: 4px; }
.toggle-btn {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid #1E1E1E;
  background: #141414;
  color: #6B7280;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.toggle-btn.active {
  background: rgba(34,197,94,0.15);
  border-color: rgba(34,197,94,0.3);
  color: #22C55E;
}

/* Save button */
.btn-save {
  background: linear-gradient(135deg, #22C55E, #16A34A);
  color: #000;
  border: none;
  padding: 12px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.2s;
}
.btn-save:hover { box-shadow: 0 4px 20px rgba(34,197,94,0.4); transform: translateY(-1px); }

/* Input dans settings */
.settings-card input[type="text"],
.settings-card input[type="email"],
.settings-card input[type="password"],
.settings-card select {
  background: #0F0F0F !important;
  border: 1px solid #1E1E1E !important;
  border-radius: 10px !important;
  color: #fff !important;
  padding: 10px 14px !important;
  width: 200px !important;
}
</style>

<script id="settings-js">
document.addEventListener('DOMContentLoaded', function() {
  // Toggle buttons
  document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      this.closest('.toggle-group').querySelectorAll('.toggle-btn')
        .forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // Color dots
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', function() {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      this.classList.add('active');
      const color = this.dataset.color;
      document.documentElement.style.setProperty('--accent', color);
      localStorage.setItem('accentColor', color);
    });
  });

  // Restore accent color
  const savedColor = localStorage.getItem('accentColor');
  if (savedColor) {
    document.documentElement.style.setProperty('--accent', savedColor);
    document.querySelectorAll('.color-dot').forEach(d => {
      if (d.dataset.color === savedColor) d.classList.add('active');
      else d.classList.remove('active');
    });
  }

  // Save button
  const saveBtn = document.querySelector('.btn-save, button[type="submit"]');
  if (saveBtn) {
    saveBtn.addEventListener('click', function(e) {
      e.preventDefault();
      this.textContent = '✓ Sauvegardé !';
      this.style.background = 'linear-gradient(135deg, #22C55E, #16A34A)';
      setTimeout(() => {
        this.textContent = 'Sauvegarder les paramètres';
      }, 2000);
    });
  }

  // Toggle switches
  document.querySelectorAll('.toggle-switch').forEach(toggle => {
    toggle.addEventListener('change', function() {
      localStorage.setItem('toggle_' + this.name, this.checked);
    });
    const saved = localStorage.getItem('toggle_' + toggle.name);
    if (saved !== null) toggle.checked = saved === 'true';
  });
});
</script></body>
