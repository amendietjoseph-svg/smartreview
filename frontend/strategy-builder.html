    <style>
        .strategy-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
        }

        .form-card h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .strategies-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            height: fit-content;
        }

        .strategies-sidebar h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .strategy-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .strategy-item {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            transition: all var(--transition-fast);
        }

        .strategy-item:hover {
            border-color: var(--accent);
        }

        .strategy-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .strategy-item-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .strategy-item-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .strategy-item-rules {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .strategy-item-actions {
            display: flex;
            gap: 8px;
        }

        .strategy-action-btn {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .strategy-action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .strategy-action-btn.delete:hover {
            border-color: #EF4444;
            color: #EF4444;
        }

        .empty-strategies {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-strategies i {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
        }

        .empty-strategies p {
            font-size: 13px;
        }
    </style>

    <script>
        let strategies = JSON.parse(localStorage.getItem('smartreview_strategies')) || [];

        // Slider value updates
        document.getElementById('riskPercent').addEventListener('input', (e) => {
            document.getElementById('riskPercentValue').textContent = e.target.value + '%';
        });
        document.getElementById('minRR').addEventListener('input', (e) => {
            document.getElementById('minRRValue').textContent = parseFloat(e.target.value).toFixed(1);
        });

        // Save strategy
        document.getElementById('saveStrategyBtn').addEventListener('click', () => {
            const name = document.getElementById('strategyName').value;
            if (!name) {
                alert('Veuillez entrer un nom pour la stratégie');
                return;
            }

            const strategy = {
                id: Date.now().toString(),
                name: name,
                description: document.getElementById('strategyDescription').value,
                timeframe: document.getElementById('timeframe').value,
                maxTrades: document.getElementById('maxTrades').value,
                sessions: Array.from(document.querySelectorAll('#strategyForm input[type="checkbox"][value="ASIA"], #strategyForm input[type="checkbox"][value="LONDON"], #strategyForm input[type="checkbox"][value="NY"]')).filter(cb => cb.checked).map(cb => cb.value),
                assets: Array.from(document.querySelectorAll('#strategyForm input[type="checkbox"][value="EURUSD"], #strategyForm input[type="checkbox"][value="GBPUSD"], #strategyForm input[type="checkbox"][value="XAUUSD"], #strategyForm input[type="checkbox"][value="US30"], #strategyForm input[type="checkbox"][value="NAS100"]')).filter(cb => cb.checked).map(cb => cb.value),
                entryConditions: document.getElementById('entryConditions').value,
                exitConditions: document.getElementById('exitConditions').value,
                riskRules: document.getElementById('riskRules').value,
                riskPercent: document.getElementById('riskPercent').value,
                minRR: document.getElementById('minRR').value,
                createdAt: new Date().toISOString()
            };

            // Count rules
            const ruleCount = (strategy.entryConditions ? 1 : 0) + (strategy.exitConditions ? 1 : 0) + (strategy.riskRules ? 1 : 0);
            strategy.ruleCount = ruleCount;

            strategies.push(strategy);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
            document.getElementById('strategyForm').reset();
            document.getElementById('riskPercentValue').textContent = '1%';
            document.getElementById('minRRValue').textContent = '2.0';
        });

        // Test strategy
        document.getElementById('testStrategyBtn').addEventListener('click', () => {
            window.location.href = 'backtesting.html';
        });

        // Render strategies
        function renderStrategies() {
            const list = document.getElementById('strategyList');

            if (strategies.length === 0) {
                list.innerHTML = `
                    <div class="empty-strategies">
                        <i data-lucide="layers"></i>
                        <p>Aucune stratégie sauvegardée</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = strategies.map(strategy => `
                <div class="strategy-item">
                    <div class="strategy-item-header">
                        <span class="strategy-item-name">${strategy.name}</span>
                        <span class="strategy-item-date">${new Date(strategy.createdAt).toLocaleDateString('fr-FR')}</span>
                    </div>
                    <div class="strategy-item-rules">${strategy.ruleCount} règle(s) • ${strategy.timeframe}</div>
                    <div class="strategy-item-actions">
                        <button class="strategy-action-btn" onclick="editStrategy('${strategy.id}')">Éditer</button>
                        <button class="strategy-action-btn" onclick="duplicateStrategy('${strategy.id}')">Dupliquer</button>
                        <button class="strategy-action-btn delete" onclick="deleteStrategy('${strategy.id}')">Supprimer</button>
                    </div>
                </div>
            `).join('');
        }

        function editStrategy(id) {
            const strategy = strategies.find(s => s.id === id);
            if (!strategy) return;

            document.getElementById('strategyName').value = strategy.name;
            document.getElementById('strategyDescription').value = strategy.description;
            document.getElementById('timeframe').value = strategy.timeframe;
            document.getElementById('maxTrades').value = strategy.maxTrades;
            document.getElementById('entryConditions').value = strategy.entryConditions;
            document.getElementById('exitConditions').value = strategy.exitConditions;
            document.getElementById('riskRules').value = strategy.riskRules;
            document.getElementById('riskPercent').value = strategy.riskPercent;
            document.getElementById('minRR').value = strategy.minRR;
            document.getElementById('riskPercentValue').textContent = strategy.riskPercent + '%';
            document.getElementById('minRRValue').textContent = parseFloat(strategy.minRR).toFixed(1);

            // Remove the strategy so it can be re-saved
            strategies = strategies.filter(s => s.id !== id);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
        }

        function duplicateStrategy(id) {
            const strategy = strategies.find(s => s.id === id);
            if (!strategy) return;

            const newStrategy = {
                ...strategy,
                id: Date.now().toString(),
                name: strategy.name + ' (copie)',
                createdAt: new Date().toISOString()
            };

            strategies.push(newStrategy);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
        }

        function deleteStrategy(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cette stratégie?')) return;
            strategies = strategies.filter(s => s.id !== id);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
        }

        // Backend status check
        setInterval(() => {
            fetch('http://localhost:5000/api/health')
                .then(res => res.json())
                .then(online => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    if (online) {
                        dot.className = 'status-dot online';
                        text.textContent = 'En ligne';
                    } else {
                        dot.className = 'status-dot offline';
                        text.textContent = 'Hors ligne';
                    }
                })
                .catch(() => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    dot.className = 'status-dot offline';
                    text.textContent = 'Hors ligne';
                });
        }, 5000);

        // Initialize
        renderStrategies();
        lucide.createIcons();
    </script>

<script id="buttons-fix">
document.addEventListener('DOMContentLoaded', function() {

  // RECHERCHE
  const searchInput = document.getElementById('globalSearch');
  const searchIcon = document.querySelector('.navbar-search-icon');
  if(searchInput) {
    searchInput.addEventListener('keypress', function(e) {
      if(e.key === 'Enter' && this.value.trim()) {
        window.open('https://www.google.com/search?q=' + encodeURIComponent(this.value + ' trading'), '_blank');
      }
    });
  }
  if(searchIcon) {
    searchIcon.style.cursor = 'pointer';
    searchIcon.addEventListener('click', function() {
      if(searchInput) searchInput.focus();
    });
  }

  // NOTIFICATIONS
  const notifBtn = document.getElementById('notifBtn');
  if(notifBtn) {
    notifBtn.addEventListener('click', function() {
      // Créer panel notifications
      let panel = document.getElementById('notifPanel');
      if(panel) { panel.remove(); return; }
      panel = document.createElement('div');
      panel.id = 'notifPanel';
      panel.style.cssText = 'position:fixed;top:64px;right:16px;width:320px;background:#141414;border:1px solid #1E1E1E;border-radius:16px;z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,0.5);';
      panel.innerHTML = `
        <div style="padding:16px;border-bottom:1px solid #1E1E1E;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:14px;font-weight:600;">Notifications</span>
          <button onclick="document.getElementById('notifPanel').remove()" style="background:none;border:none;color:#6B7280;cursor:pointer;font-size:18px;">×</button>
        </div>
        <div style="padding:16px;">
          <div style="text-align:center;padding:24px;color:#374151;font-size:13px;">
            <div style="font-size:32px;margin-bottom:8px;">🔔</div>
            Aucune notification pour le moment
          </div>
        </div>`;
      document.body.appendChild(panel);
      document.addEventListener('click', function closePanel(e) {
        if(!panel.contains(e.target) && e.target !== notifBtn) {
          panel.remove();
          document.removeEventListener('click', closePanel);
        }
      }, { once: false });
    });
  }

  // REFRESH
  const refreshBtn = document.getElementById('refreshBtn');
  if(refreshBtn) {
    refreshBtn.addEventListener('click', function() {
      this.style.transform = 'rotate(360deg)';
      this.style.transition = 'transform 0.5s';
      setTimeout(() => { this.style.transform = ''; }, 500);
      window.location.reload();
    });
  }

  // BALANCE PILL
  const balancePill = document.getElementById('balancePill');
  if(balancePill) {
    balancePill.style.cursor = 'pointer';
    balancePill.addEventListener('click', () => window.location.href = 'accounts.html');
  }

  // AVATAR / USER MENU
  const avatarBtn = document.getElementById('userAvatarBtn');
  const dropdown = document.getElementById('userDropdown');
  if(avatarBtn && dropdown) {
    avatarBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
      dropdown.style.cssText = 'display:block;position:absolute;top:100%;right:0;background:#141414;border:1px solid #1E1E1E;border-radius:12px;min-width:180px;z-index:1000;box-shadow:0 8px 24px rgba(0,0,0,0.5);overflow:hidden;';
    });
    document.addEventListener('click', function() {
      if(dropdown) dropdown.style.display = 'none';
    });
  }

  // USER INFO depuis localStorage
  try {
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if(user.name) {
      const initials = document.getElementById('userAvatarInitials');
      const img = document.getElementById('userAvatarImg');
      if(initials) initials.textContent = user.name.slice(0,2).toUpperCase();
      if(img && user.picture) {
        img.src = user.picture;
        img.classList.remove('hidden');
        img.style.display = 'block';
        if(initials) initials.style.display = 'none';
      }
    }
  } catch(e) {}

  // LOGOUT
  const logoutBtn = document.getElementById('logoutBtn');
  if(logoutBtn) {
    logoutBtn.addEventListener('click', function() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'login.html';
    });
  }

  // NOUVEAU TRADE BTN
  const newTradeBtn = document.getElementById('sidebarNewTradeBtn');
  if(newTradeBtn) {
    newTradeBtn.addEventListener('click', function() {
      // Ouvrir modal si sur dashboard
      const modal = document.getElementById('tradeModal');
      if(modal) {
        modal.classList.add('active');
        modal.style.display = 'flex';
      } else {
        window.location.href = 'journal.html';
      }
    });
  }

  // MOBILE MENU
  const mobileMenuBtn = document.getElementById('mobileMenuBtn');
  const sidebar = document.getElementById('sidebar');
  if(mobileMenuBtn && sidebar) {
    mobileMenuBtn.addEventListener('click', function() {
      sidebar.classList.toggle('open');
    });
  }

  // SIDEBAR TOGGLE
  const sidebarToggle = document.getElementById('sidebarToggle');
  const appWrapper = document.getElementById('appWrapper');
  if(sidebarToggle) {
    sidebarToggle.addEventListener('click', function() {
      sidebar && sidebar.classList.toggle('collapsed');
      appWrapper && appWrapper.classList.toggle('sidebar-collapsed');
      localStorage.setItem('sidebarCollapsed', sidebar && sidebar.classList.contains('collapsed'));
    });
    // Restaurer état
    if(localStorage.getItem('sidebarCollapsed') === 'true') {
      sidebar && sidebar.classList.add('collapsed');
      appWrapper && appWrapper.classList.add('sidebar-collapsed');
    }
  }

});
</script><script id="keepalive">
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:8001'
  : 'https://smartreview-y4sq.onrender.com';

// Reveiller le backend au chargement
async function wakeBackend() {
  try {
    const res = await fetch(API_BASE + '/', {method:'GET'});
    const statusDot = document.getElementById('backendStatus');
    const statusText = document.getElementById('backendStatusText');
    if(res.ok) {
      if(statusDot) statusDot.className = 'status-dot online';
      if(statusText) statusText.textContent = 'En ligne';
    }
  } catch(e) {
    const statusDot = document.getElementById('backendStatus');
    const statusText = document.getElementById('backendStatusText');
    if(statusDot) statusDot.className = 'status-dot offline';
    if(statusText) statusText.textContent = 'Hors ligne';
  }
}

// Ping toutes les 10 minutes pour garder le backend actif
wakeBackend();
setInterval(wakeBackend, 10 * 60 * 1000);
</script></body>
