<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2322C55E'/><polyline points='6,22 12,14 17,18 22,10 26,10' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='26' cy='10' r='2.5' fill='white'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFX-Review - Strategy Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .strategy-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }

        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
        }

        .form-card h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
        }

        .slider-value {
            min-width: 50px;
            text-align: right;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .strategies-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            height: fit-content;
        }

        .strategies-sidebar h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .strategy-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .strategy-item {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            transition: all var(--transition-fast);
        }

        .strategy-item:hover {
            border-color: var(--accent);
        }

        .strategy-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .strategy-item-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .strategy-item-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .strategy-item-rules {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .strategy-item-actions {
            display: flex;
            gap: 8px;
        }

        .strategy-action-btn {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .strategy-action-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .strategy-action-btn.delete:hover {
            border-color: #EF4444;
            color: #EF4444;
        }

        .empty-strategies {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-strategies i {
            width: 32px;
            height: 32px;
            margin-bottom: 12px;
        }

        .empty-strategies p {
            font-size: 13px;
        }
    </style>

<style>
*:not(input[type=range]):not(.status-dot):not(.avatar):not(img) {
  border-radius: inherit;
}
div, section, article, aside, nav, header, footer,
button, input, select, textarea, a {
  border-radius: 14px;
}
.navbar, .sidebar, body, html { border-radius: 0 !important; }
input[type=checkbox], input[type=radio] { border-radius: 4px !important; }
.avatar, .status-dot { border-radius: 50% !important; }
input[type=range] { border-radius: 2px !important; }
</style>
<style>
div { border-radius: 16px !important; }
button { border-radius: 12px !important; }
input, select, textarea { border-radius: 10px !important; }
.navbar, .sidebar, body, html { border-radius: 0 !important; }
.avatar { border-radius: 50% !important; }
</style>
<style id="gradients">
.hero-section, .coach-hero, .page-hero {
  background: linear-gradient(135deg, #052e16 0%, #1e1b4b 100%) !important;
  border-bottom: 1px solid rgba(139,92,246,0.2) !important;
}
.new-trade-btn {
  background: linear-gradient(135deg, #22C55E, #16A34A) !important;
  box-shadow: 0 4px 20px rgba(34,197,94,0.3) !important;
}
.period-btn.active {
  background: linear-gradient(135deg, #22C55E, #16A34A) !important;
  color: #000 !important;
}
.nav-item.active, .sidebar-item.active, .navbar-link.active {
  background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(139,92,246,0.1)) !important;
}
.kpi-card.green {
  background: linear-gradient(135deg, #141414, #052e16) !important;
  border-color: rgba(34,197,94,0.2) !important;
}
.kpi-card.purple {
  background: linear-gradient(135deg, #141414, #1e1b4b) !important;
  border-color: rgba(139,92,246,0.2) !important;
}
.kpi-card.blue {
  background: linear-gradient(135deg, #141414, #1e3a5f) !important;
  border-color: rgba(59,130,246,0.2) !important;
}
.kpi-card.gold {
  background: linear-gradient(135deg, #141414, #2d1f00) !important;
  border-color: rgba(245,158,11,0.2) !important;
}
.kpi-card.red {
  background: linear-gradient(135deg, #141414, #2d0a0a) !important;
  border-color: rgba(239,68,68,0.2) !important;
}
</style>
<style id="bg-fix">
html, body {
  min-height: 100vh !important;
  width: 100% !important;
  background: linear-gradient(135deg, #050d0a 0%, #0a0a1a 50%, #120a0f 100%) !important;
  background-attachment: fixed !important;
}
.app-wrapper, .main-content, .content-area {
  background: transparent !important;
}
.sidebar {
  background: rgba(8,8,12,0.95) !important;
}
.navbar {
  background: rgba(6,10,8,0.95) !important;
  backdrop-filter: blur(20px) !important;
}
.kpi-card, .card, .chart-card, .session-card,
.trade-panel, .panel-block, .modal-box,
.settings-card, .login-card {
  background: rgba(20,20,28,0.8) !important;
  backdrop-filter: blur(10px) !important;
}
</style></head>
<body>
    <!-- Main Content -->
        <div id="app-layout-root"></div>
    <div class="app-wrapper" id="appWrapper">
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <div class="breadcrumb">Outils / Strategy Builder</div>
                    <h1 class="page-title">Strategy Builder</h1>
                </div>
            </header>

            <div class="content-area">
                <div class="strategy-layout">
                    <!-- Strategy Form -->
                    <div class="form-card">
                        <h2>Créer une Stratégie</h2>
                        <form id="strategyForm">
                            <div class="form-grid">
                                <div class="form-group full-width">
                                    <label>Nom de la stratégie</label>
                                    <input type="text" id="strategyName" placeholder="Ex: MSS+Sweep sur EURUSD">
                                </div>
                                <div class="form-group full-width">
                                    <label>Description</label>
                                    <textarea id="strategyDescription" placeholder="Décrivez votre stratégie..."></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Timeframe</label>
                                    <select id="timeframe">
                                        <option value="M1">M1</option>
                                        <option value="M5">M5</option>
                                        <option value="M15">M15</option>
                                        <option value="H1" selected>H1</option>
                                        <option value="H4">H4</option>
                                        <option value="D1">D1</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Max Trades par Jour</label>
                                    <input type="number" id="maxTrades" value="5" min="1" max="20">
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Sessions de Trading</label>
                                <div class="checkbox-group">
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="ASIA" checked> ASIA
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="LONDON" checked> LONDON
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="NY" checked> NY
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Actifs Tradés</label>
                                <div class="checkbox-group">
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="EURUSD" checked> EURUSD
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="GBPUSD"> GBPUSD
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="XAUUSD"> XAUUSD
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="US30"> US30
                                    </label>
                                    <label class="checkbox-item">
                                        <input type="checkbox" value="NAS100"> NAS100
                                    </label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Conditions d'Entrée</label>
                                <textarea id="entryConditions" placeholder="Décrivez les conditions pour entrer en position..."></textarea>
                            </div>

                            <div class="form-group">
                                <label>Conditions de Sortie</label>
                                <textarea id="exitConditions" placeholder="Décrivez les conditions pour sortir de position..."></textarea>
                            </div>

                            <div class="form-group">
                                <label>Règles de Gestion du Risque</label>
                                <textarea id="riskRules" placeholder="Décrivez vos règles de gestion du risque..."></textarea>
                            </div>

                            <div class="form-grid">
                                <div class="form-group">
                                    <label>% Risque par Trade</label>
                                    <div class="slider-container">
                                        <input type="range" id="riskPercent" min="0.5" max="5" step="0.1" value="1">
                                        <span class="slider-value" id="riskPercentValue">1%</span>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>RR Minimum</label>
                                    <div class="slider-container">
                                        <input type="range" id="minRR" min="1" max="5" step="0.1" value="2">
                                        <span class="slider-value" id="minRRValue">2.0</span>
                                    </div>
                                </div>
                            </div>

                            <div class="form-actions">
                                <button type="button" class="btn btn-primary" id="saveStrategyBtn">Sauvegarder la stratégie</button>
                                <button type="button" class="btn btn-secondary" id="testStrategyBtn">Tester avec mes trades</button>
                            </div>
                        </form>
                    </div>

                    <!-- Saved Strategies -->
                    <div class="strategies-sidebar">
                        <h3>Mes Stratégies Sauvegardées</h3>
                        <div class="strategy-list" id="strategyList">
                            <!-- Strategies will be populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script>
        let strategies = JSON.parse(localStorage.getItem('smartreview_strategies')) || [];

        // Slider value updates
        document.getElementById('riskPercent').addEventListener('input', (e) => {
            document.getElementById('riskPercentValue').textContent = e.target.value + '%';
        });
        document.getElementById('minRR').addEventListener('input', (e) => {
            document.getElementById('minRRValue').textContent = parseFloat(e.target.value).toFixed(1);
        });

        // Save strategy
        document.getElementById('saveStrategyBtn').addEventListener('click', () => {
            const name = document.getElementById('strategyName').value;
            if (!name) {
                alert('Veuillez entrer un nom pour la stratégie');
                return;
            }

            const strategy = {
                id: Date.now().toString(),
                name: name,
                description: document.getElementById('strategyDescription').value,
                timeframe: document.getElementById('timeframe').value,
                maxTrades: document.getElementById('maxTrades').value,
                sessions: Array.from(document.querySelectorAll('#strategyForm input[type="checkbox"][value="ASIA"], #strategyForm input[type="checkbox"][value="LONDON"], #strategyForm input[type="checkbox"][value="NY"]')).filter(cb => cb.checked).map(cb => cb.value),
                assets: Array.from(document.querySelectorAll('#strategyForm input[type="checkbox"][value="EURUSD"], #strategyForm input[type="checkbox"][value="GBPUSD"], #strategyForm input[type="checkbox"][value="XAUUSD"], #strategyForm input[type="checkbox"][value="US30"], #strategyForm input[type="checkbox"][value="NAS100"]')).filter(cb => cb.checked).map(cb => cb.value),
                entryConditions: document.getElementById('entryConditions').value,
                exitConditions: document.getElementById('exitConditions').value,
                riskRules: document.getElementById('riskRules').value,
                riskPercent: document.getElementById('riskPercent').value,
                minRR: document.getElementById('minRR').value,
                createdAt: new Date().toISOString()
            };

            // Count rules
            const ruleCount = (strategy.entryConditions ? 1 : 0) + (strategy.exitConditions ? 1 : 0) + (strategy.riskRules ? 1 : 0);
            strategy.ruleCount = ruleCount;

            strategies.push(strategy);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
            document.getElementById('strategyForm').reset();
            document.getElementById('riskPercentValue').textContent = '1%';
            document.getElementById('minRRValue').textContent = '2.0';
        });

        // Test strategy
        document.getElementById('testStrategyBtn').addEventListener('click', () => {
            window.location.href = 'backtesting.html';
        });

        // Render strategies
        function renderStrategies() {
            const list = document.getElementById('strategyList');

            if (strategies.length === 0) {
                list.innerHTML = `
                    <div class="empty-strategies">
                        <i data-lucide="layers"></i>
                        <p>Aucune stratégie sauvegardée</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = strategies.map(strategy => `
                <div class="strategy-item">
                    <div class="strategy-item-header">
                        <span class="strategy-item-name">${strategy.name}</span>
                        <span class="strategy-item-date">${new Date(strategy.createdAt).toLocaleDateString('fr-FR')}</span>
                    </div>
                    <div class="strategy-item-rules">${strategy.ruleCount} règle(s) • ${strategy.timeframe}</div>
                    <div class="strategy-item-actions">
                        <button class="strategy-action-btn" onclick="editStrategy('${strategy.id}')">Éditer</button>
                        <button class="strategy-action-btn" onclick="duplicateStrategy('${strategy.id}')">Dupliquer</button>
                        <button class="strategy-action-btn delete" onclick="deleteStrategy('${strategy.id}')">Supprimer</button>
                    </div>
                </div>
            `).join('');
        }

        function editStrategy(id) {
            const strategy = strategies.find(s => s.id === id);
            if (!strategy) return;

            document.getElementById('strategyName').value = strategy.name;
            document.getElementById('strategyDescription').value = strategy.description;
            document.getElementById('timeframe').value = strategy.timeframe;
            document.getElementById('maxTrades').value = strategy.maxTrades;
            document.getElementById('entryConditions').value = strategy.entryConditions;
            document.getElementById('exitConditions').value = strategy.exitConditions;
            document.getElementById('riskRules').value = strategy.riskRules;
            document.getElementById('riskPercent').value = strategy.riskPercent;
            document.getElementById('minRR').value = strategy.minRR;
            document.getElementById('riskPercentValue').textContent = strategy.riskPercent + '%';
            document.getElementById('minRRValue').textContent = parseFloat(strategy.minRR).toFixed(1);

            // Remove the strategy so it can be re-saved
            strategies = strategies.filter(s => s.id !== id);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
        }

        function duplicateStrategy(id) {
            const strategy = strategies.find(s => s.id === id);
            if (!strategy) return;

            const newStrategy = {
                ...strategy,
                id: Date.now().toString(),
                name: strategy.name + ' (copie)',
                createdAt: new Date().toISOString()
            };

            strategies.push(newStrategy);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
        }

        function deleteStrategy(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cette stratégie?')) return;
            strategies = strategies.filter(s => s.id !== id);
            localStorage.setItem('smartreview_strategies', JSON.stringify(strategies));
            renderStrategies();
        }

        // Backend status check
        setInterval(() => {
            fetch('http://localhost:5000/api/health')
                .then(res => res.json())
                .then(online => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    if (online) {
                        dot.className = 'status-dot online';
                        text.textContent = 'En ligne';
                    } else {
                        dot.className = 'status-dot offline';
                        text.textContent = 'Hors ligne';
                    }
                })
                .catch(() => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    dot.className = 'status-dot offline';
                    text.textContent = 'Hors ligne';
                });
        }, 5000);

        // Initialize
        renderStrategies();
        lucide.createIcons();
    </script>
    <script src="/js/layout.js"></script>
</body>
</html>
