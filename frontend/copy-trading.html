<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2322C55E'/><polyline points='6,22 12,14 17,18 22,10 26,10' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='26' cy='10' r='2.5' fill='white'/></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartFX-Review - Copy Trading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <style>
        .demo-badge {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(225, 29, 72, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            z-index: 100;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        .metric-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .metric-value.positive {
            color: #10B981;
        }

        .empty-state {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 60px 20px;
            text-align: center;
        }

        .empty-state i {
            width: 48px;
            height: 48px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .traders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .trader-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 20px;
            transition: all var(--transition-fast);
        }

        .trader-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .trader-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .trader-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: white;
        }

        .trader-info {
            flex: 1;
        }

        .trader-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .trader-status {
            font-size: 11px;
            color: #10B981;
            font-weight: 600;
        }

        .trader-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .trader-stat {
            background: var(--bg-primary);
            padding: 10px;
            border-radius: var(--radius-sm);
        }

        .trader-stat-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .trader-stat-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .trader-stat-value.positive {
            color: #10B981;
        }

        .trader-stat-value.negative {
            color: #EF4444;
        }

        .trader-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .trader-followers {
            font-size: 12px;
            color: var(--text-muted);
        }

        .copy-btn {
            padding: 8px 16px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition-fast);
        }

        .copy-btn:hover {
            background: var(--accent-hover);
        }
    </style>

<style>
*:not(input[type=range]):not(.status-dot):not(.avatar):not(img) {
  border-radius: inherit;
}
div, section, article, aside, nav, header, footer,
button, input, select, textarea, a {
  border-radius: 14px;
}
.navbar, .sidebar, body, html { border-radius: 0 !important; }
input[type=checkbox], input[type=radio] { border-radius: 4px !important; }
.avatar, .status-dot { border-radius: 50% !important; }
input[type=range] { border-radius: 2px !important; }
</style>
<style>
div { border-radius: 16px !important; }
button { border-radius: 12px !important; }
input, select, textarea { border-radius: 10px !important; }
.navbar, .sidebar, body, html { border-radius: 0 !important; }
.avatar { border-radius: 50% !important; }
</style>
<style id="gradients">
.hero-section, .coach-hero, .page-hero {
  background: linear-gradient(135deg, #052e16 0%, #1e1b4b 100%) !important;
  border-bottom: 1px solid rgba(139,92,246,0.2) !important;
}
.new-trade-btn {
  background: linear-gradient(135deg, #22C55E, #16A34A) !important;
  box-shadow: 0 4px 20px rgba(34,197,94,0.3) !important;
}
.period-btn.active {
  background: linear-gradient(135deg, #22C55E, #16A34A) !important;
  color: #000 !important;
}
.nav-item.active, .sidebar-item.active, .navbar-link.active {
  background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(139,92,246,0.1)) !important;
}
.kpi-card.green {
  background: linear-gradient(135deg, #141414, #052e16) !important;
  border-color: rgba(34,197,94,0.2) !important;
}
.kpi-card.purple {
  background: linear-gradient(135deg, #141414, #1e1b4b) !important;
  border-color: rgba(139,92,246,0.2) !important;
}
.kpi-card.blue {
  background: linear-gradient(135deg, #141414, #1e3a5f) !important;
  border-color: rgba(59,130,246,0.2) !important;
}
.kpi-card.gold {
  background: linear-gradient(135deg, #141414, #2d1f00) !important;
  border-color: rgba(245,158,11,0.2) !important;
}
.kpi-card.red {
  background: linear-gradient(135deg, #141414, #2d0a0a) !important;
  border-color: rgba(239,68,68,0.2) !important;
}
</style>
<style id="bg-v4">
html {
  height: 100%;
  background: 
    radial-gradient(ellipse 70% 50% at 0% 0%, rgba(0,80,40,0.6) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(80,0,50,0.6) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 100% 0%, rgba(0,20,80,0.4) 0%, transparent 55%),
    #060810 !important;
  background-attachment: fixed !important;
  background-repeat: no-repeat !important;
  background-size: cover !important;
}
body {
  background: transparent !important;
  min-height: 100vh !important;
}
.app-wrapper, .main-content, .content-area,
#sessionsView, #analyticsView,
.backtest-sessions, .app-container {
  background: transparent !important;
}
.sidebar { background: rgba(3,5,4,0.97) !important; }
.navbar { background: rgba(3,4,8,0.97) !important; }
</style></head>
<body>
    <!-- Main Content -->
        <div id="app-layout-root"></div>
    <div class="app-wrapper" id="appWrapper">
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <div class="breadcrumb">Outils / Copy Trading</div>
                    <h1 class="page-title">Copy Trading</h1>
                </div>
            </header>

            <div class="content-area">
                <div class="demo-badge">DÉMO</div>

                <!-- Copy Metrics -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">Capital Alloué</div>
                        <div class="metric-value">$0</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Performance</div>
                        <div class="metric-value positive">+0%</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Trades Copiés (Mois)</div>
                        <div class="metric-value">0</div>
                    </div>
                </div>

                <!-- My Copied Strategies -->
                <div class="empty-state" style="margin-bottom: 32px;">
                    <i data-lucide="users"></i>
                    <p>Vous ne copiez aucune stratégie pour le moment</p>
                    <button class="btn btn-primary">Explorer les traders</button>
                </div>

                <!-- Traders to Follow -->
                <h2 style="font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 20px;">Traders à Suivre</h2>
                <div class="traders-grid" id="tradersGrid">
                    <!-- Traders will be populated by JS -->
                </div>
            </div>
        </main>
    </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script>
        const traders = [
            { name: "Alexandre Martin", avatar: "AM", avatarColor: "#E11D48", winRate: 68, avgRR: 2.5, drawdown: 12, followers: 234 },
            { name: "Sophie Dubois", avatar: "SD", avatarColor: "#3B82F6", winRate: 72, avgRR: 2.1, drawdown: 8, followers: 189 },
            { name: "Pierre Laurent", avatar: "PL", avatarColor: "#10B981", winRate: 65, avgRR: 2.8, drawdown: 15, followers: 156 },
            { name: "Marie Bernard", avatar: "MB", avatarColor: "#F59E0B", winRate: 70, avgRR: 2.3, drawdown: 10, followers: 145 },
            { name: "Jean Moreau", avatar: "JM", avatarColor: "#8B5CF6", winRate: 75, avgRR: 2.0, drawdown: 7, followers: 128 }
        ];

        function renderTraders() {
            const grid = document.getElementById('tradersGrid');
            grid.innerHTML = traders.map(trader => `
                <div class="trader-card">
                    <div class="trader-header">
                        <div class="trader-avatar" style="background: ${trader.avatarColor};">${trader.avatar}</div>
                        <div class="trader-info">
                            <div class="trader-name">${trader.name}</div>
                            <div class="trader-status">● En ligne</div>
                        </div>
                    </div>
                    <div class="trader-stats">
                        <div class="trader-stat">
                            <div class="trader-stat-label">Win Rate</div>
                            <div class="trader-stat-value positive">${trader.winRate}%</div>
                        </div>
                        <div class="trader-stat">
                            <div class="trader-stat-label">RR Moyen</div>
                            <div class="trader-stat-value">${trader.avgRR}</div>
                        </div>
                        <div class="trader-stat">
                            <div class="trader-stat-label">Drawdown</div>
                            <div class="trader-stat-value negative">${trader.drawdown}%</div>
                        </div>
                        <div class="trader-stat">
                            <div class="trader-stat-label">Followers</div>
                            <div class="trader-stat-value">${trader.followers}</div>
                        </div>
                    </div>
                    <div class="trader-footer">
                        <span class="trader-followers">${trader.followers} followers</span>
                        <button class="copy-btn">Copier</button>
                    </div>
                </div>
            `).join('');
        }

        // Backend status check
        setInterval(() => {
            fetch('http://localhost:5000/api/health')
                .then(res => res.json())
                .then(online => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    if (online) {
                        dot.className = 'status-dot online';
                        text.textContent = 'En ligne';
                    } else {
                        dot.className = 'status-dot offline';
                        text.textContent = 'Hors ligne';
                    }
                })
                .catch(() => {
                    const dot = document.getElementById('backendStatus');
                    const text = document.getElementById('backendStatusText');
                    dot.className = 'status-dot offline';
                    text.textContent = 'Hors ligne';
                });
        }, 5000);

        // Initialize
        renderTraders();
        lucide.createIcons();
    </script>
    <script src="/js/layout.js"></script>
</body>
</html>
